name: Build precon index

# Regenera el índice ligero de mazos precon (precons/index.json + version.json) desde MTGJSON.
# Semanal (lunes) + ejecución manual desde la pestaña Actions.
on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-precon-index
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generar índice
        run: python precons/build_index.py

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add precons/index.json precons/version.json
          if git diff --staged --quiet; then
            echo "Sin cambios en el índice."
          else
            git commit -m "Actualiza índice de precons ($(date -u +%F))"
            git push
          fi
